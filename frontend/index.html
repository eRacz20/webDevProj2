<!DOCTYPE html>
<html>
<head>
<title>Movie Collection</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎬 Movie Collection</h1>

<div class="controls">
<input id="search" placeholder="Search title">
<select id="ratingFilter">
<option value="">All Ratings</option>
<option value="7">7+</option>
<option value="8">8+</option>
<option value="9">9+</option>
</select>
<button onclick="loadMovies()">Search</button>
</div>

<div class="form">
<input id="title" placeholder="Title">
<input id="year" placeholder="Year">
<input id="genre" placeholder="Genre">
<input id="rating" placeholder="Rating">
<input id="image" placeholder="Image URL">
<button onclick="saveMovie()">Add / Update Movie</button>
</div>

<div id="stats" class="stats"></div>
<div id="movies" class="grid"></div>

<script src="script.js"></script>
</body>
</html>
