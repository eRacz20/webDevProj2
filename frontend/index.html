<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Movie Collection</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎬 Movie Collection</h1>

<div class="controls">

<input id="search" placeholder="Search title">

<select id="ratingFilter">
<option value="">All Ratings</option>
<option>10</option><option>9</option><option>8</option>
<option>7</option><option>6</option><option>5</option>
</select>

<select id="sort">
<option value="title">Sort by Title</option>
<option value="rating">Sort by Rating</option>
<option value="year">Sort by Year</option>
</select>

<button onclick="load()">Search</button>

</div>

<div class="addBox">
<input id="title" placeholder="Title">
<input id="year" placeholder="Year">
<input id="genre" placeholder="Genre">
<input id="rating" placeholder="Rating">
<input id="image" placeholder="Image URL">
<button onclick="add()">Add / Update Movie</button>
</div>

<h2 id="stats"></h2>

<div id="movies" class="grid"></div>

<script src="script.js"></script>
</body>
</html>
