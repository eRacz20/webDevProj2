<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🎬 Movie Watchlist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎬 Movie Watchlist</h1>

<section id="stats">
    <p>Total Movies: <span id="totalMovies">0</span></p>
    <p>Page Size: <span id="currentPageSize">10</span></p>
    <p>Average Rating: <span id="avgRating">0</span></p>
</section>

<section>
    <h2>Add / Edit Movie</h2>

    <form id="movieForm">
        <input type="hidden" id="movieId">

        <label>Title</label>
        <input type="text" id="title" required>

        <label>Genre</label>
        <input type="text" id="genre" required>

        <label>Year</label>
        <input type="number" id="year" required>

        <label>Rating</label>
        <input type="number" id="rating" required>

        <label>Image URL</label>
        <input type="text" id="image_url">

        <button type="submit">Save</button>
    </form>
</section>

<section>

<div style="margin-bottom:10px;">
    <input id="searchBox" placeholder="Search title">

    <select id="genreFilter"></select>

    <select id="sortBy">
        <option value="">Sort By</option>
        <option value="title">Title</option>
        <option value="year">Year</option>
        <option value="rating">Rating</option>
    </select>

    <label>Page Size:</label>
    <select id="pageSizeSelect">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="50">50</option>
    </select>
</div>

<h2>My Movies</h2>

<table>
<thead>
<tr>
<th>Poster</th>
<th>Title</th>
<th>Genre</th>
<th>Year</th>
<th>Rating</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="movieTable"></tbody>
</table>

<div style="margin-top:10px;">
<button onclick="prevPage()">Prev</button>
<span id="pageNum">Page 1</span>
<button onclick="nextPage()">Next</button>
</div>

</section>

<script src="app.js"></script>
</body>
</html>
